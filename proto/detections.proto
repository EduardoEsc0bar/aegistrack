syntax = "proto3";

package aegistrack.telemetry.v1;

import "common.proto";

message Detection {
  Header header = 1;
  uint64 sensor_id = 2;
  string sensor_type = 3;
  string measurement_type = 4;
  repeated double z = 5;
  repeated double R = 6;
  uint32 z_dim = 7;
  double confidence = 8;
}

message DetectionBatch {
  Header header = 1;
  repeated Detection detections = 2;
}
